services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dental_clinic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dental
      POSTGRES_PASSWORD: dental
      POSTGRES_DB: dental_clinic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dental_clinic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: dental_clinic_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  voice-worker:
    build: .
    container_name: dental_clinic_voice_worker
    command: python -m app.voice.worker start
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  reminder-worker:
    build: .
    container_name: dental_clinic_reminder_worker
    command: python -m app.reminders.scheduler
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

volumes:
  pgdata:
